name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y automake

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Download shareware doom1.wad
        run: |
          curl -L "https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad" \
            -o src/doom1.wad

      - name: Build WebAssembly
        run: |
          emconfigure autoreconf -fiv
          ac_cv_exeext=".html" emconfigure ./configure --host=none-none-none
          emmake make

      - name: Collect build assets
        run: |
          mkdir -p /tmp/build
          cp src/index.html /tmp/build/
          cp src/websockets-doom.js /tmp/build/
          cp src/websockets-doom.wasm /tmp/build/
          cp src/default.cfg /tmp/build/
          cp src/doom1.wad /tmp/build/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.1.3
        with:
          name: doom-wasm-build
          path: /tmp/build/

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: doom-wasm-build
          path: /tmp/pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
