name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y automake autoconf libtool

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Download doom1.wad (shareware)
        run: |
          curl -L --fail \
            https://distro.ibiblio.org/slitaz/sources/packages/d/doom1.wad \
            -o src/doom1.wad
          echo "f0cefca49926d00903cf57551d901abe  src/doom1.wad" | md5sum -c -

      - name: Build
        run: ./scripts/build.sh

      - name: Prepare deployment artifact
        run: |
          mkdir -p _site
          cp src/index.html _site/
          cp src/websockets-doom.js _site/
          cp src/websockets-doom.wasm _site/
          cp src/doom1.wad _site/
          cp src/default.cfg _site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
